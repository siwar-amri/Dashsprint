<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="card my-5">
        <div class="card-body">
          <a href="#" class="d-flex justify-content-center">
            <img src="assets/images/SprintDashCropped.png" height="75px" width="230px"/>
          </a>
          <div class="row">
            <div class="d-flex justify-content-center">
              <div class="auth-header">
                <h2 class="text-secondary mt-5"><b>Hi, Welcome Back</b></h2>
                <p class="fs-4 mt-2">Enter your credentials to continue</p>
              </div>
            </div>
          </div>
          <div class="d-grid">
            <button type="button" class="btn mt-2 btn-light-primary bg-light text-muted">
              <img src="assets/images/authentication/google-icon.svg"  />
              Sign In With Google
            </button>
          </div>
          <div class="separator mt-3">
            <span>or</span>
          </div>
          <h5 class="my-4 d-flex justify-content-center">Sign in with Email address</h5>
          
          <!-- Email Field -->
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" [(ngModel)]="email" name="email" required />
            <label for="floatingInput">Email address / Username</label>
          </div>
          
          <!-- Password Field -->
          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required />
            <label for="password">Password</label>
          </div>

          <div class="d-flex mt-1 justify-content-between">
            <div class="form-check">
              <input class="form-check-input input-primary" type="checkbox" id="customCheckc1" [(ngModel)]="rememberMe" />
              <label class="form-check-label text-muted" for="customCheckc1">Remember me</label>
            </div>
            <h5 class="text-secondary">
              <a href="javascript:">Forgot Password?</a>
            </h5>
          </div>

          <!-- Login Button -->
          <div class="d-grid mt-4">
            <button type="button" class="btn btn-secondary" (click)="login()">Sign In</button>
            <div *ngIf="errorMessage">{{ errorMessage }}</div>
          </div>
          <hr />
          <h5 class="d-flex justify-content-center">
            <a href="guest/register">Don't have an account?</a>
          </h5>
        </div>
      </div>
    </div>
  </div>
</div>
