<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
/>
<div class="contact-page">
<!-- Header -->
<header class="navbar bg-secondary-dark text-white py-3 px-4">
  <div class="logo">
    <a href="/home/">
      <img
        src="assets/images/logo_light.png"
        alt="Logo SprintDash"
        width="150px"
      />
    </a>
  </div>
  <nav class="nav-links d-flex align-items-center">
    <!-- Search Bar -->
    <div class="search-bar d-flex align-items-center mx-3">
      <input
        type="text"
        placeholder="Search..."
        class="form-control search-input"
        aria-label="Search"
      />
      <button class="btn btn-light search-button" aria-label="Search">
        <i class="fas fa-search"></i>
      </button>
    </div>
    <a href="/home/" class="text-white mx-3">Home</a>
    <a href="/services/" class="text-white mx-3">Services</a>
    <a href="/guest/register" class="text-white btn btn-light mx-3">Sign Up</a>
  </nav>
</header>


<!-- Hero Section -->
<section class="hero-section">
  <div class="hero-content">
    <h1 class="font-weight-bold">Contact us!</h1>
    <p>We'd love to hear from you! Get in touch with our team.</p>
    <button class="btn btn-secondary">
      <a href='guest/login' class="text-white text-decoration-none">
        Get Started
      </a>
    </button>
  </div>
</section>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="container">
      <div class="row">
        <!-- Contact Information Section -->
        <div class="col-lg-6 col-md-12">
          <div class="card">
            <div class="card-body">
              <h3>Reach Out to Us</h3>
              <p>
                Have questions? Our support team is here to help. Fill out the
                form below or use one of our direct contact methods.
              </p>
            </div>
          </div>
        </div>

        <!-- Contact Form Section -->
        <div class="col-lg-6 col-md-12">
          <form class="card">
            <div class="form-group">
              <label for="name">Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="Your Name"
                required
              />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="Your Email"
                required
              />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                class="form-control"
                id="message"
                rows="4"
                placeholder="Your Message"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 DashSprint. All rights reserved.</p>
    <div class="social-links">
      <a href="#" class="nav-item">Facebook</a>
      <a href="#" class="nav-item">Twitter</a>
      <a href="#" class="nav-item">LinkedIn</a>
    </div>
  </footer>
</div>
